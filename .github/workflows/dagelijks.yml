name: Dagelijkse woningzoeker

on:
  schedule:
    - cron: '0 7 * * *'   # elke dag om 07:00 NL-tijd
  workflow_dispatch:        # ook handmatig starten

jobs:
  zoek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Installeer requests
        run: pip install requests
      - name: Voer zoeker uit
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:   ${{ secrets.EMAIL_TO }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python zoeker.py
